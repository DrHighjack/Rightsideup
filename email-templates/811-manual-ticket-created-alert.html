<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>811 Ticket Created</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #334155; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: #fff; padding: 36px 28px; text-align: center; }
    .content { padding: 28px; }
    .box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px; }
    .row { margin-bottom: 10px; font-size: 13px; }
    .label { font-weight: 700; color: #1d4ed8; }
    .btn { display: inline-block; margin-top: 16px; background: #1d4ed8; color: #fff; text-decoration: none; padding: 12px 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>811 Ticket Created</h1><p>Manual creation by admin</p></div>
    <div class="content">
      <p>An administrator manually created a new 811 ticket. Please review and process as needed.</p>
      <div class="box">
        <div class="row"><span class="label">Ticket:</span> {{ticket_number}}</div>
        <div class="row"><span class="label">From:</span> {{from_email}}</div>
        <div class="row"><span class="label">Subject:</span> {{email_subject}}</div>
        <div class="row"><span class="label">Parsed Address:</span> {{parsed_address}}</div>
      </div>
      <div style="text-align: center;"><a href="{{review_link}}" class="btn">Review Ticket</a></div>
    </div>
  </div>
</body>
</html>
