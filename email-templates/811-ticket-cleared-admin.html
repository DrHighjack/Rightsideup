<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>811 Ticket Cleared</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #334155; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: #fff; padding: 36px 28px; text-align: center; }
    .content { padding: 28px; }
    .box { background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; padding: 14px; }
    .row { margin-bottom: 10px; font-size: 13px; }
    .label { font-weight: 700; color: #047857; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>811 Ticket Cleared</h1><p>Held orders were released</p></div>
    <div class="content">
      <div class="box">
        <div class="row"><span class="label">Ticket:</span> {{ticket_number}}</div>
        <div class="row"><span class="label">Orders Released:</span> {{orders_released_count}}</div>
      </div>
      <p><span class="label">Order Numbers:</span> {{order_numbers_csv}}</p>
      <p>{{admin_notes}}</p>
    </div>
  </div>
</body>
</html>
