<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>811 Ticket Created</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #334155; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: #fff; padding: 36px 28px; text-align: center; }
    .content { padding: 28px; }
    .box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px; }
    .row { margin-bottom: 10px; font-size: 13px; }
    .label { font-weight: 700; color: #1d4ed8; }
    .btn { display: inline-block; margin-top: 16px; background: #1d4ed8; color: #fff; text-decoration: none; padding: 12px 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>811 Ticket Created</h1>
      <p>Matching process complete</p>
    </div>
    <div class="content">
      <p>An inbound 811 ticket was processed and matching orders have been evaluated for hold status.</p>
      <div class="box">
        <div class="row"><span class="label">Ticket:</span> {{ticket_number}}</div>
        <div class="row"><span class="label">Address:</span> {{address}}</div>
        <div class="row"><span class="label">Work Start:</span> {{work_start_date}}</div>
        <div class="row"><span class="label">Status:</span> {{status}}</div>
        <div class="row"><span class="label">Matched Orders:</span> {{matched_orders_count}}</div>
      </div>
      <div style="text-align: center;"><a href="{{ticket_link}}" class="btn">View Ticket Details</a></div>
    </div>
  </div>
</body>
</html>
