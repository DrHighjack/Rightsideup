<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reorder Request Alert</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #334155; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: #fff; padding: 36px 28px; text-align: center; }
    .content { padding: 28px; }
    .box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px; }
    .label { font-weight: 700; color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Reorder Request Received</h1><p>Inventory or sign fulfillment needed</p></div>
    <div class="content">
      <div class="box">
        <p><span class="label">Request Type:</span> {{request_type}}</p>
        <p><span class="label">Requested By:</span> {{requested_by}}</p>
        <p><span class="label">Quantity:</span> {{quantity}}</p>
        <p><span class="label">Item:</span> {{item_or_type}}</p>
        <p><span class="label">Printer:</span> {{printer_name}}</p>
      </div>
      <p><span class="label">Notes:</span> {{notes}}</p>
    </div>
  </div>
</body>
</html>
