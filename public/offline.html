<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignPost Field - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
        "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
        sans-serif;
      background: linear-gradient(135deg, #1f6940 0%, #2d8659 100%);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1a1a1a;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .status {
      background: #fef3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      color: #856404;
      font-size: 14px;
    }

    .action {
      margin-top: 30px;
    }

    button {
      background: #1f6940;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #165230;
    }

    button:active {
      transform: scale(0.98);
    }

    .tip {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5ee;
      border-radius: 6px;
      font-size: 14px;
      color: #1a6640;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .icon {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>SignPost Field requires an internet connection to place orders and manage your account.</p>

    <div class="status">
      <strong>Connection Status:</strong> No internet detected
    </div>

    <p>Please check your internet connection and try again.</p>

    <div class="action">
      <button onclick="window.location.reload()">Reconnect & Refresh</button>
    </div>

    <div class="tip">
      <strong>Tip:</strong> Once you reconnect, you'll be able to access all features and place
      new orders.
    </div>
  </div>

  <script>
    // Listen for online event and auto-reload
    window.addEventListener("online", function () {
      window.location.reload();
    });

    // Optional: periodically check connection
    setInterval(function () {
      fetch("/.well-known/assetlinks.json", { method: "HEAD" }).then(
        function () {
          // Connection restored
          window.location.reload();
        },
        function () {
          // Still offline
        }
      );
    }, 5000);
  </script>
</body>
</html>
